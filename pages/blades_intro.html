<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blade Intro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #blade-intro {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        /* --- Flash overlay --- */
        #flash-overlay {
            position: absolute;
            inset: 0;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 10;
        }

        /* --- Letters --- */
        #word-container {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 5;
            user-select: none;
        }

        .letter {
            font-family: 'Cinzel', serif;
            font-weight: 900;
            font-size: clamp(60px, 14vw, 160px);
            color: #fff;
            display: inline-block;
            opacity: 0;
            text-shadow:
                0 0 20px rgba(255,255,255,0.4),
                0 0 60px rgba(255,255,255,0.1);
            line-height: 1;
        }

        /* --- Blood canvas overlay --- */
        #blood-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 6;
        }

        /* --- Logo --- */
        #logo-wrap {
            margin-top: 20px;
            width: clamp(60px, 10vw, 120px);
            opacity: 0;
            position: relative;
            z-index: 5;
            filter: drop-shadow(0 0 12px rgba(212,0,0,0.7));
        }

        /* --- Shake animation --- */
        @keyframes shake {
            0%   { transform: translate(0, 0) rotate(0deg); }
            15%  { transform: translate(-6px, 3px) rotate(-1deg); }
            30%  { transform: translate(6px, -3px) rotate(1deg); }
            45%  { transform: translate(-4px, 4px) rotate(-0.5deg); }
            60%  { transform: translate(4px, -2px) rotate(0.5deg); }
            75%  { transform: translate(-2px, 2px) rotate(0deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        .shaking {
            animation: shake 0.35s ease-out;
        }
    </style>
</head>
<body>
    <audio controls autoplay hidden>
        <source src="../assets/music/dark_cyberpunk_industrial_bass_dark_techno_type_beat_azameth_cut.mp3" type="audio/mpeg">
        <source src="../assets/music/dark_cyberpunk_industrial_bass_dark_techno_type_beat_azameth_cut.wav" type="audio/wav">
    </audio>

    <div id="blade-intro">
        <div id="flash-overlay"></div>

        <div id="word-container">
            <span class="letter" id="l-B">B</span>
            <span class="letter" id="l-l">l</span>
            <span class="letter" id="l-a">a</span>
            <span class="letter" id="l-d">d</span>
            <span class="letter" id="l-e">e</span>
            <span class="letter" id="l-s">s</span>
            
        </div>

        <canvas id="blood-canvas"></canvas>

        <div id="logo-wrap">
            <svg viewBox="0 0 100 100" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
            <g id="g5">
                <path style="fill:#e6e6e6;stroke-width:0.931754"
                d="m 49.798264,19.807263 c -11.221744,-0.07275 -21.505486,-0.09986 -32.713045,2.19653 -3.304971,0.677177 -7.3659448,1.561095 -9.8459073,5.349359 -3.909768,8.695597 5.1525613,29.736075 9.5188363,45.891084 l 5.708984,-37.688912 c 6.729804,-1.92659 16.846924,-1.950834 26.712891,-2.07885 v -0.02883 c 9.776949,0.120014 18.054758,0.07495 25.851562,1.751592 l 6.333985,38.01448 C 85.576588,56.784104 92.797197,32.409183 89.010148,26.27049 86.530186,22.482227 81.74815,22.293244 78.66496,21.737766 66.873821,19.613437 49.798264,19.807263 49.798264,19.807263 Z"/>
            </g>
            <path style="fill:#d40000;stroke-width:1.00901"
                d="M 22.615196,35.424494 16.637262,73.217323 9.0272179,47.660714 6.4900287,36.727426 c 4.1507883,0.870196 6.0170073,2.353894 9.7698843,1.663279 1.656078,-0.304756 4.720337,0.354266 6.355283,-2.966211 z"/>
            <ellipse style="fill:#d40000;stroke-width:0.851607"
                cx="16.289043" cy="90.964828" rx="6.0537825" ry="5.6460748"/>
            <path style="fill:#d40000"
                d="m -53.048613,-25.463334 8.258859,14.953348 8.25886,14.9533469 -17.079409,-0.3242929 -17.079408,-0.3242911 8.82055,-14.6290549 z"
                transform="matrix(0.34047757,0,0,0.48947352,34.597183,87.106141)"/>
            </svg>
        </div>
    </div>

    <script>
    (function() {
        const flash    = document.getElementById('flash-overlay');
        const intro    = document.getElementById('blade-intro');
        const wordBox  = document.getElementById('word-container');
        const canvas   = document.getElementById('blood-canvas');
        const ctx      = canvas.getContext('2d');
        const logoWrap = document.getElementById('logo-wrap');

        const letters = {
            B: document.getElementById('l-B'),
            l: document.getElementById('l-l'),
            a: document.getElementById('l-a'),
            d: document.getElementById('l-d'),
            e: document.getElementById('l-e'),
            s: document.getElementById('l-s'),
        };

        // Resize canvas
        function resizeCanvas() {
            canvas.width  = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ── Utility ──────────────────────────────────────────────────────────────

        function flashScreen(opacity, duration, cb) {
            flash.style.transition = 'none';
            flash.style.opacity = opacity;
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    flash.style.transition = `opacity ${duration}ms ease`;
                    flash.style.opacity = 0;
                    if (cb) setTimeout(cb, duration);
                });
            });
        }

        function slideIn(leftEl, rightEl, duration, cb) {
            const vw = window.innerWidth;

            [leftEl, rightEl].forEach(el => {
                el.style.transition = 'none';
                el.style.opacity = '1';
            });

            leftEl.style.transform  = `translateX(-${vw}px)`;
            rightEl.style.transform = `translateX(${vw}px)`;

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    leftEl.style.transition  = `transform ${duration}ms cubic-bezier(0.22, 0.61, 0.36, 1)`;
                    rightEl.style.transition = `transform ${duration}ms cubic-bezier(0.22, 0.61, 0.36, 1)`;
                    leftEl.style.transform  = 'translateX(0)';
                    rightEl.style.transform = 'translateX(0)';
                    if (cb) setTimeout(cb, duration);
                });
            });
        }

        function shakeWord() {
            wordBox.classList.remove('shaking');
            void wordBox.offsetWidth; // reflow
            wordBox.classList.add('shaking');
            setTimeout(() => wordBox.classList.remove('shaking'), 400);
        }

        // ── Blood drip system ────────────────────────────────────────────────────

        let drops = [];
        let bloodActive = false;
        let bloodFrame;

        function getLetterBottomPositions() {
            const positions = [];
            Object.values(letters).forEach(el => {
                const rect = el.getBoundingClientRect();
                // sample multiple x positions along letter width
                for (let i = 0; i < 3; i++) {
                    positions.push({
                        x: rect.left + (rect.width * (0.2 + i * 0.3)),
                        y: rect.bottom - 4
                    });
                }
            });
            return positions;
        }

        class BloodDrop {
            constructor(x, y) {
                this.x = x + (Math.random() - 0.5) * 20;
                this.y = y;
                this.vy = 0.5 + Math.random() * 1.5;
                this.radius = 3 + Math.random() * 5;
                this.trail = [];
                this.alive = true;
                this.maxTrail = 20 + Math.random() * 20;
                this.splat = false;
                this.splatRadius = 0;
                this.splatAlpha = 1;
                this.alpha = 1;
            }

            update() {
                if (this.splat) {
                    this.splatRadius += 1.5;
                    this.splatAlpha -= 0.05;
                    if (this.splatAlpha <= 0) this.alive = false;
                    return;
                }

                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > this.maxTrail) this.trail.shift();

                this.vy += 0.12; // gravity
                this.y += this.vy;

                if (this.y > canvas.height - 5) {
                    this.splat = true;
                }
            }

            draw() {
                ctx.save();

                if (this.splat) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.splatRadius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(180, 0, 0, ${this.splatAlpha * 0.4})`;
                    ctx.fill();
                    ctx.restore();
                    return;
                }

                // Draw trail
                if (this.trail.length > 1) {
                    ctx.beginPath();
                    ctx.moveTo(this.trail[0].x, this.trail[0].y);
                    for (let i = 1; i < this.trail.length; i++) {
                        ctx.lineTo(this.trail[i].x, this.trail[i].y);
                    }
                    ctx.strokeStyle = `rgba(180, 0, 0, 0.5)`;
                    ctx.lineWidth = this.radius * 0.5;
                    ctx.lineCap = 'round';
                    ctx.stroke();
                }

                // Draw droplet
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(200, 0, 0, ${this.alpha})`;
                ctx.shadowColor = '#900';
                ctx.shadowBlur = 6;
                ctx.fill();

                ctx.restore();
            }
        }

        // Pools at the bottom of letters (static red)
        let pools = [];

        class BloodPool {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.rx = 2 + Math.random() * 8;
                this.ry = 2 + Math.random() * 3;
                this.alpha = 0;
                this.growing = true;
            }
            update() {
                if (this.growing && this.alpha < 0.85) this.alpha += 0.01;
                if (this.growing && this.rx < 30) { this.rx += 0.1; this.ry += 0.03; }
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.ellipse(this.x, this.y, this.rx, this.ry, 0, 0, Math.PI * 2);
                ctx.fillStyle = '#aa0000';
                ctx.fill();
                ctx.restore();
            }
        }

        function spawnDrop(positions) {
            const pos = positions[Math.floor(Math.random() * positions.length)];
            drops.push(new BloodDrop(pos.x, pos.y));
        }

        let spawnInterval;
        let positions;

        function startBlood() {
            bloodActive = true;
            positions = getLetterBottomPositions();

            // Seed some pools under letters
            Object.values(letters).forEach(el => {
                const rect = el.getBoundingClientRect();
                pools.push(new BloodPool(
                    rect.left + rect.width / 2 + (Math.random()-0.5)*20,
                    rect.bottom + 8
                ));
            });

            spawnInterval = setInterval(() => {
                if (!bloodActive) { clearInterval(spawnInterval); return; }
                // spawn 1-3 drops
                const count = 1 + Math.floor(Math.random() * 3);
                for (let i = 0; i < count; i++) spawnDrop(positions);
            }, 80);

            animateBlood();
        }

        function animateBlood() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            pools.forEach(p => { p.update(); p.draw(); });
            drops = drops.filter(d => d.alive);
            drops.forEach(d => { d.update(); d.draw(); });

            bloodFrame = requestAnimationFrame(animateBlood);
        }

        // ── Glitch text effect on letters ───────────────────────────────────────

        function applyGlitch(el, duration) {
            const colors = ['#ff0000', '#00ffff', '#ffffff'];
            let count = 0;
            const interval = setInterval(() => {
                el.style.textShadow = `
                    ${(Math.random()-0.5)*8}px 0 ${colors[Math.floor(Math.random()*colors.length)]},
                    ${(Math.random()-0.5)*8}px 0 ${colors[Math.floor(Math.random()*colors.length)]}
                `;
                count++;
                if (count > 6) {
                    clearInterval(interval);
                    el.style.textShadow = `0 0 20px rgba(255,255,255,0.4), 0 0 60px rgba(255,255,255,0.1)`;
                }
            }, 40);
        }

        // ── Main sequence ────────────────────────────────────────────────────────

        function runSequence() {
            // Step 1: Opening flash
            flashScreen(1, 400, () => {

                // Step 2: Pair 1 — a (left) + d (right)   [inner pair]
                setTimeout(() => {
                    slideIn(letters['a'], letters['d'], 500, () => {
                        shakeWord();
                        [letters['a'], letters['d']].forEach(el => applyGlitch(el, 300));
                    });
                }, 200);

                // Step 3: Pair 2 — l (left) + e (right)
                setTimeout(() => {
                    slideIn(letters['l'], letters['e'], 500, () => {
                        shakeWord();
                        [letters['l'], letters['e']].forEach(el => applyGlitch(el, 300));
                    });
                }, 950);

                // Step 4: Pair 3 — B (left) + s (right)   [outer pair]
                setTimeout(() => {
                    slideIn(letters['B'], letters['s'], 500, () => {
                        shakeWord();
                        [letters['B'], letters['s']].forEach(el => applyGlitch(el, 300));

                        // Step 5: Final flash after word complete
                        setTimeout(() => {
                            flashScreen(0.9, 500, () => {

                                // Step 6: Blood starts
                                setTimeout(() => {
                                    startBlood();

                                    // Step 7: Logo fades in
                                    setTimeout(() => {
                                        logoWrap.style.transition = 'opacity 1s ease';
                                        logoWrap.style.opacity = '1';
                                    }, 600);

                                    // Step 8: Stop spawning + redirect
                                    setTimeout(() => {
                                        bloodActive = false;
                                        clearInterval(spawnInterval);

                                        // Fade to black, then redirect
                                        intro.style.transition = 'opacity 0.8s ease';
                                        intro.style.opacity = '0';
                                        setTimeout(() => {
                                            window.location.href = '../secret';
                                        }, 900);
                                    }, 4000);

                                }, 150);
                            });
                        }, 300);
                    });
                }, 1700);

            });
        }

        // Kick off after fonts load
        document.fonts.ready.then(() => {
            setTimeout(runSequence, 300);
        });

    })();
    </script>
</body>
</html>
